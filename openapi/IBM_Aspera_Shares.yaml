openapi: 3.1.0
info:
  title: Aspera Shares API
  contact:
    name: IBM
    email: aspera@ibm.com
    url: https://ibm.com/aspera
  version: 1.0.0
  license:
    name: Proprietary
  description: |
    Complete API documentation for Aspera Shares, a secure file sharing and collaboration platform.

    This API provides comprehensive access to:
    - Files operations
    - Transfer authorizations
    - User and Group management
    - Shares and access control
    - Node operations
    - Administrative functions

    ## Authentication

    The API uses HTTP Basic Authentication.
    Include your credentials in the Authorization header:

    ```
    Authorization: Basic base64(username:password)
    ```

    ## Base URLs

    - `/node_api` - API for file and transfer operation. A subset of HSTS Node API.
    - `/api/v1` - API for Administration (User, Group, Node management)
servers:
  - url: https://{hostname}
    description: Aspera Shares Server
    variables:
      hostname:
        default: shares.example.com
        description: Your Aspera Shares hostname

security:
  - basicAuth: []

tags:
  - name: API Information
    description: List of base endpoints
  - name: Files
    description: File operations (Node API)
  - name: Users
    description: User account management
  - name: Groups
    description: Group management
  - name: Shares
    description: Share management and operations
  - name: Nodes
    description: Node management
  - name: Transfer Settings
    description: Transfer management and monitoring
  - name: SMTP Servers
    description: SMTP server configuration
paths:
  # Node API Endpoints
  /node_api:
    get:
      tags:
        - Files
      summary: Get Node API information
      description: Returns general information about the Node API
      operationId: getNodeApiInfo
      responses:
        "200":
          description: Node API information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  endpoints:
                    type: array
                    items:
                      type: string

  /node_api/ping:
    get:
      tags:
        - Files
      summary: Ping the Node API
      description: Health check endpoint to verify Node API availability
      operationId: pingNodeApi
      responses:
        "200":
          description: Successful ping
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /node_api/info:
    get:
      tags:
        - Files
      summary: Get Node information
      description: Returns detailed information about the Node
      operationId: getNodeInfo
      responses:
        "200":
          description: Node information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeInfo"

  /node_api/space:
    post:
      tags:
        - Files
      summary: Get space information
      description: Returns storage space information for the specified path
      operationId: getSpaceInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Path to check space for
                  example: /
      responses:
        "200":
          description: Space information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/files/browse:
    post:
      tags:
        - Files
      summary: Browse files and folders
      description: List files and folders in the specified path
      operationId: browseFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
              properties:
                path:
                  type: string
                  description: Path to browse
                  example: /folder
                sort:
                  type: string
                  enum: [name, size, mtime, type]
                  description: Sort field
                direction:
                  type: string
                  enum: [asc, desc]
                  description: Sort direction
      responses:
        "200":
          description: File listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileItem"
                  total:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /node_api/files/info:
    post:
      tags:
        - Files
      summary: Get file information
      description: Returns detailed information about specific files
      operationId: getFileInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paths
              properties:
                paths:
                  type: array
                  items:
                    type: string
                  description: Array of file paths
                  example: ["/file1.txt", "/folder/file2.pdf"]
      responses:
        "200":
          description: File information
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/files/create:
    post:
      tags:
        - Files
      summary: Create file or folder
      description: Creates a new file or folder at the specified path
      operationId: createFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
                - type
              properties:
                path:
                  type: string
                  description: Path where to create the item
                  example: /newfolder
                type:
                  type: string
                  enum: [file, directory]
                  description: Type of item to create
      responses:
        "201":
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Item already exists

  /node_api/files/rename:
    post:
      tags:
        - Files
      summary: Rename file or folder
      description: Renames a file or folder
      operationId: renameFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
                - new_path
              properties:
                path:
                  type: string
                  description: Current path
                  example: /oldname.txt
                new_path:
                  type: string
                  description: New path
                  example: /newname.txt
      responses:
        "200":
          description: Item renamed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Target already exists

  /node_api/files/delete:
    post:
      tags:
        - Files
      summary: Delete files or folders
      description: Deletes one or more files or folders
      operationId: deleteFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paths
              properties:
                paths:
                  type: array
                  items:
                    type: string
                  description: Array of paths to delete
                  example: ["/file1.txt", "/folder2"]
      responses:
        "200":
          description: Items deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /node_api/files/upload_setup:
    post:
      tags:
        - Files
      summary: Setup file upload
      description: Prepares and returns transfer specification for uploading files
      operationId: setupUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transfer_requests
              properties:
                transfer_requests:
                  type: array
                  items:
                    $ref: "#/components/schemas/TransferRequest"
      responses:
        "200":
          description: Upload setup successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSpec"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/files/download_setup:
    post:
      tags:
        - Files
      summary: Setup file download
      description: Prepares and returns transfer specification for downloading files
      operationId: setupDownload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transfer_requests
              properties:
                transfer_requests:
                  type: array
                  items:
                    $ref: "#/components/schemas/TransferRequest"
      responses:
        "200":
          description: Download setup successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSpec"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/files/sync_setup:
    post:
      tags:
        - Files
      summary: Setup file sync
      description: Prepares and returns transfer specification for syncing files
      operationId: setupSync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transfer_requests
              properties:
                transfer_requests:
                  type: array
                  items:
                    $ref: "#/components/schemas/TransferRequest"
      responses:
        "200":
          description: Sync setup successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSpec"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/transfers:
    post:
      tags:
        - Files
      summary: Create transfer
      description: Initiates a new transfer
      operationId: createNodeTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferCreate"
      responses:
        "201":
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/transfers/{id}:
    get:
      tags:
        - Files
      summary: Get transfer status
      description: Returns the status and details of a specific transfer
      operationId: getNodeTransfer
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: Transfer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Files
      summary: Update transfer
      description: Updates transfer properties (e.g., pause, resume)
      operationId: updateNodeTransfer
      parameters:
        - $ref: "#/components/parameters/TransferId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [pause, resume, cancel]
      responses:
        "200":
          description: Transfer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Files
      summary: Delete/cancel transfer
      description: Cancels and removes a transfer
      operationId: deleteNodeTransfer
      parameters:
        - $ref: "#/components/parameters/TransferId"
      responses:
        "204":
          description: Transfer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /node_api/{share}/watchds/{daemon}/subscriptions:
    post:
      tags:
        - Files
      summary: Create watchd subscription
      description: Creates a new watchd subscription for monitoring file changes
      operationId: createWatchdSubscription
      parameters:
        - name: share
          in: path
          required: true
          schema:
            type: string
          description: Share identifier
        - name: daemon
          in: path
          required: true
          schema:
            type: string
          description: Watchd daemon identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchdSubscription"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchdSubscription"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/{share}/watchds/{daemon}/subscriptions/{subscription}:
    put:
      tags:
        - Files
      summary: Update watchd subscription
      description: Updates an existing watchd subscription
      operationId: updateWatchdSubscription
      parameters:
        - name: share
          in: path
          required: true
          schema:
            type: string
          description: Share identifier
        - name: daemon
          in: path
          required: true
          schema:
            type: string
          description: Watchd daemon identifier
        - name: subscription
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchdSubscription"
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchdSubscription"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /node_api/{share}/watchds/{daemon}/subscriptions/{subscription}/snapshots:
    post:
      tags:
        - Files
      summary: Create watchd snapshot
      description: Creates a snapshot for a watchd subscription
      operationId: createWatchdSnapshot
      parameters:
        - name: share
          in: path
          required: true
          schema:
            type: string
          description: Share identifier
        - name: daemon
          in: path
          required: true
          schema:
            type: string
          description: Watchd daemon identifier
        - name: subscription
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/{share}/watchds/{daemon}/subscriptions/{subscription}/results:
    post:
      tags:
        - Files
      summary: Create watchd result
      description: Creates a result entry for a watchd subscription
      operationId: createWatchdResult
      parameters:
        - name: share
          in: path
          required: true
          schema:
            type: string
          description: Share identifier
        - name: daemon
          in: path
          required: true
          schema:
            type: string
          description: Watchd daemon identifier
        - name: subscription
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Result created
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /node_api/{share}/watchds/{daemon}/subscriptions/{subscription}/results/{result}:
    get:
      tags:
        - Files
      summary: Get watchd result
      description: Retrieves a specific watchd result
      operationId: getWatchdResult
      parameters:
        - name: share
          in: path
          required: true
          schema:
            type: string
          description: Share identifier
        - name: daemon
          in: path
          required: true
          schema:
            type: string
          description: Watchd daemon identifier
        - name: subscription
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
        - name: result
          in: path
          required: true
          schema:
            type: string
          description: Result identifier
      responses:
        "200":
          description: Result details
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Files
      summary: Delete watchd result
      description: Deletes a watchd result
      operationId: deleteWatchdResult
      parameters:
        - name: share
          in: path
          required: true
          schema:
            type: string
          description: Share identifier
        - name: daemon
          in: path
          required: true
          schema:
            type: string
          description: Watchd daemon identifier
        - name: subscription
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
        - name: result
          in: path
          required: true
          schema:
            type: string
          description: Result identifier
      responses:
        "204":
          description: Result deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # API v1 Endpoints
  /api/v1:
    get:
      tags:
        - API Information
      summary: Get API v1 information
      description: Returns general information about API v1
      operationId: getApiV1Info
      responses:
        "200":
          description: API information
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource_type:
                    type: string
                  links:
                    type: array
                    items:
                      type: object
                      properties:
                        rel:
                          type: string
                        href:
                          type: string
                      required:
                        - rel
                        - href
                required:
                  - resource_type
                  - links

  # User Endpoints
  /api/v1/data/users:
    get:
      tags:
        - Users
      summary: List users
      description: Returns a paginated list of users
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - name: filter
          in: query
          description: Filter users by various criteria
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Users
      summary: Create user
      description: Creates a new user account
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/data/users/{user_id}:
    get:
      tags:
        - Users
      summary: Get user
      description: Returns details of a specific user
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Users
      summary: Update user
      description: Updates an existing user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Users
      summary: Delete user
      description: Deletes a user account
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # Group Endpoints
  /api/v1/data/groups:
    get:
      tags:
        - Groups
      summary: List groups
      description: Returns a paginated list of groups
      operationId: listGroups
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Groups
      summary: Create group
      description: Creates a new group
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupCreate"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/data/groups/{group_id}:
    get:
      tags:
        - Groups
      summary: Get group
      description: Returns details of a specific group
      operationId: getGroup
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Groups
      summary: Update group
      description: Updates an existing group
      operationId: updateGroup
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdate"
      responses:
        "200":
          description: Group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Groups
      summary: Delete group
      description: Deletes a group
      operationId: deleteGroup
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "204":
          description: Group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # Share Endpoints
  /api/v1/data/shares:
    get:
      tags:
        - Shares
      summary: List shares
      description: Returns a paginated list of shares
      operationId: listShares
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: List of shares
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
