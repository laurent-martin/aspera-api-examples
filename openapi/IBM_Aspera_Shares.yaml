  # Transfer Settings Endpoints
  /api/v1/data/transfer_settings:
    get:
      tags:
        - Transfer Settings
      summary: Get global transfer settings
      description: Returns global transfer settings that apply to all users and groups unless overridden
      operationId: getGlobalTransferSettings
      responses:
        "200":
          description: Global transfer settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSettings"
              example:
                min_connect_version: "3.6.1"
                upload_target_rate: "10.0 Kbps"
                upload_target_rate_cap: null
                download_target_rate: null
                download_target_rate_cap: null
                starting_policy: null
                allowed_policy: null
                encryption: null
                encryption_at_rest: null
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags:
        - Transfer Settings
      summary: Update global transfer settings
      description: |
        Updates global transfer settings. Use blank strings to indicate inherited settings.

        Valid values:
        - starting_policy: "", "fixed", "high", "fair", "low"
        - allowed_policy: "", "fixed, high, fair, and low", "high, fair, and low", "fair and low", "low"
        - encryption: "", "Optional", "AES-128"
        - encryption_at_rest: "", "Optional", "Required"
      operationId: updateGlobalTransferSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferSettingsUpdate"
      responses:
        "200":
          description: Transfer settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/data/users/{user_id}/transfer_settings:
    get:
      tags:
        - Transfer Settings
      summary: Get user transfer settings
      description: |
        Returns transfer settings specific to a user. 
        Returns 404 if the user doesn't have specific settings (inherits global settings).
      operationId: getUserTransferSettings
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User transfer settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTransferSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User has no specific transfer settings (inherits global settings)
    put:
      tags:
        - Transfer Settings
      summary: Update user transfer settings
      description: Updates transfer settings for a specific user
      operationId: updateUserTransferSettings
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferSettingsUpdate"
      responses:
        "200":
          description: User transfer settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTransferSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags:
        - Transfer Settings
      summary: Delete user transfer settings
      description: |
        Removes user-specific transfer settings, causing the user to inherit global settings.
        Returns 204 even if no specific settings exist.
      operationId: deleteUserTransferSettings
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User transfer settings deleted (user now inherits global settings)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/data/groups/{group_id}/transfer_settings:
    get:
      tags:
        - Transfer Settings
      summary: Get group transfer settings
      description: |
        Returns transfer settings specific to a group.
        Returns 404 if the group doesn't have specific settings (inherits global settings).
      operationId: getGroupTransferSettings
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group transfer settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTransferSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Group has no specific transfer settings (inherits global settings)
    put:
      tags:
        - Transfer Settings
      summary: Update group transfer settings
      description: Updates transfer settings for a specific group
      operationId: updateGroupTransferSettings
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferSettingsUpdate"
      responses:
        "200":
          description: Group transfer settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTransferSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags:
        - Transfer Settings
      summary: Delete group transfer settings
      description: |
        Removes group-specific transfer settings, causing the group to inherit global settings.
        Returns 204 even if no specific settings exist.
      operationId: deleteGroupTransferSettings
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "204":
          description: Group transfer settings deleted (group now inherits global settings)
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication with username and password

  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
      description: User ID

    GroupId:
      name: group_id
      in: path
      required: true
      schema:
        type: integer
      description: Group ID

    ShareId:
      name: share_id
      in: path
      required: true
      schema:
        type: integer
      description: Share ID

    NodeId:
      name: node_id
      in: path
      required: true
      schema:
        type: integer
      description: Node ID

    TransferId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Transfer ID

    Page:
      name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPage:
      name: per_page
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

    Sort:
      name: sort
      in: query
      description: Sort field and direction (e.g., "name", "-created_at")
      schema:
        type: string

  schemas:
    # User Schemas
    User:
      type: object
      properties:
        id:
          type: integer
          description: Unique user identifier
          example: 123
        username:
          type: string
          description: Username for login
          example: john.doe
        email:
          type: string
          format: email
          description: User email address
          example: john.doe@example.com
        first_name:
          type: string
          description: User's first name
          example: John
        last_name:
          type: string
          description: User's last name
          example: Doe
        role:
          type: string
          enum: [admin, user, manager, guest]
          description: User role
        active:
          type: boolean
          description: Whether the user account is active
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    UserCreate:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: john.doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: User password (minimum 8 characters)
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        role:
          type: string
          enum: [admin, user, manager, guest]
          default: user
        active:
          type: boolean
          default: true

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [admin, user, manager, guest]
        active:
          type: boolean
        password:
          type: string
          format: password
          minLength: 8

    # Group Schemas
    Group:
      type: object
      properties:
        id:
          type: integer
          example: 456
        name:
          type: string
          example: Engineering
        description:
          type: string
          example: Engineering department group
        member_count:
          type: integer
          description: Number of members in the group
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GroupCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string

    GroupUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string

    # Share Schemas
    Share:
      type: object
      properties:
        id:
          type: integer
          example: 789
        name:
          type: string
          example: Project Files
        description:
          type: string
        node_id:
          type: integer
          description: Associated node ID
        path:
          type: string
          description: Share root path
          example: /shares/project
        created_by:
          type: integer
          description: User ID of creator
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ShareCreate:
      type: object
      required:
        - name
        - node_id
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        node_id:
          type: integer
        path:
          type: string

    ShareUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        path:
          type: string

    # Node Schemas
    Node:
      type: object
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: Primary Storage
        host:
          type: string
          example: node1.example.com
        access_key:
          type: string
          description: Access key for node authentication
        storage_type:
          type: string
          enum: [local, cloud, hybrid]
        status:
          type: string
          enum: [active, inactive, maintenance]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NodeCreate:
      type: object
      required:
        - name
        - host
      properties:
        name:
          type: string
        host:
          type: string
        access_key:
          type: string
        storage_type:
          type: string
          enum: [local, cloud, hybrid]

    NodeUpdate:
      type: object
      properties:
        name:
          type: string
        host:
          type: string
        access_key:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]

    # Node API Schemas
    NodeInfo:
      type: object
      properties:
        current_time:
          type: string
        application:
          type: string
        version:
          type: string
        capabilities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: boolean
            required:
              - name
              - value
      required:
        - current_time
        - application
        - version
        - capabilities

    SpaceInfo:
      type: object
      properties:
        total:
          type: integer
          format: int64
          description: Total space in bytes
          example: 1099511627776
        available:
          type: integer
          format: int64
          description: Available space in bytes
          example: 549755813888
        used:
          type: integer
          format: int64
          description: Used space in bytes
          example: 549755813888
        percentage:
          type: number
          format: float
          description: Percentage of space used
          example: 50.0

    FileItem:
      type: object
      properties:
        name:
          type: string
          example: document.pdf
        path:
          type: string
          example: /folder/document.pdf
        type:
          type: string
          enum: [file, directory]
        size:
          type: integer
          format: int64
          description: File size in bytes
        modified_time:
          type: string
          format: date-time
        permissions:
          type: string
          example: rwxr-xr-x

    FileInfo:
      type: object
      properties:
        name:
          type: string
          example: document.pdf
        path:
          type: string
          example: /folder/document.pdf
        type:
          type: string
          enum: [file, directory]
        size:
          type: integer
          format: int64
        created_time:
          type: string
          format: date-time
        modified_time:
          type: string
          format: date-time
        accessed_time:
          type: string
          format: date-time
        permissions:
          type: string
        owner:
          type: string
        checksum:
          type: string
          description: File checksum (MD5/SHA)

    TransferRequest:
      type: object
      required:
        - paths
      properties:
        paths:
          type: array
          items:
            type: string
          description: Array of file/folder paths to transfer
        destination:
          type: string
          description: Destination path for upload
        aspera_connect_settings:
          type: object
          description: Aspera Connect configuration options

    TransferSpec:
      type: object
      properties:
        transfer_spec:
          type: object
          description: Aspera transfer specification
          properties:
            paths:
              type: array
              items:
                type: object
            remote_host:
              type: string
            remote_user:
              type: string
            token:
              type: string
            direction:
              type: string
              enum: [send, receive]
            target_rate_kbps:
              type: integer
        aspera_connect_settings:
          type: object

    TransferCreate:
      type: object
      required:
        - transfer_spec
      properties:
        transfer_spec:
          type: object
          description: Aspera transfer specification

    Transfer:
      type: object
      properties:
        id:
          type: string
          example: xfer-123abc
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled, paused]
        direction:
          type: string
          enum: [upload, download, sync]
        bytes_transferred:
          type: integer
          format: int64
        total_bytes:
          type: integer
          format: int64
        percentage:
          type: number
          format: float
        rate_kbps:
          type: integer
          description: Current transfer rate in Kbps
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    WatchdSubscription:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
          description: Path to monitor
        events:
          type: array
          items:
            type: string
            enum: [create, modify, delete, move]
        active:
          type: boolean

    # SMTP Server Schemas
    SmtpServer:
      type: object
      properties:
        id:
          type: integer
          example: 13
        server:
          type: string
          description: SMTP server hostname
          example: smtp.gmail.com
        port:
          type: integer
          description: SMTP server port
          example: 587
        username:
          type: string
          description: SMTP authentication username
          example: demo@asperasoft.net
        from:
          type: string
          description: From email address
          example: aspera-systems@asperasoft.net
        from_address:
          type: string
          nullable: true
          description: Optional custom from address
        from_name:
          type: string
          nullable: true
          description: Optional custom from name
        tls:
          type: boolean
          description: Use TLS encryption
          example: true
        timeout:
          type: integer
          description: Connection timeout in seconds
          example: 3
        status:
          type: string
          nullable: true
          description: Server status
        status_at:
          type: string
          format: date-time
          nullable: true
          description: Last status check timestamp
        status_message:
          type: string
          nullable: true
          description: Status message or error
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        salt:
          type: string
          description: Salt for password encryption
          example: 429979e40788ba6e9df1

    SmtpServerCreate:
      type: object
      required:
        - server
        - port
        - username
        - password
      properties:
        server:
          type: string
          example: smtp.gmail.com
        port:
          type: integer
          example: 587
        username:
          type: string
          example: user@example.com
        password:
          type: string
          format: password
          description: SMTP authentication password
        from:
          type: string
          format: email
        from_address:
          type: string
          format: email
        from_name:
          type: string
        tls:
          type: boolean
          default: true
        timeout:
          type: integer
          default: 3
          minimum: 1
          maximum: 60

    SmtpServerUpdate:
      type: object
      properties:
        server:
          type: string
        port:
          type: integer
        username:
          type: string
        password:
          type: string
          format: password
        from:
          type: string
          format: email
        from_address:
          type: string
          format: email
        from_name:
          type: string
        tls:
          type: boolean
        timeout:
          type: integer
          minimum: 1
          maximum: 60

    # Transfer Settings Schemas
    TransferSettings:
      type: object
      properties:
        min_connect_version:
          type: string
          description: Minimum Aspera Connect version required (format X.Y or X.Y.Z or X.Y.Z.W)
          example: "3.6.1"
          nullable: true
        upload_target_rate:
          type: string
          description: Target upload rate (e.g., "1.5 Gbps", "500Mbps", "10 K", "3000")
          example: "10.0 Kbps"
          nullable: true
        upload_target_rate_cap:
          type: string
          description: Maximum upload rate cap
          example: "500.0 Mbps"
          nullable: true
        download_target_rate:
          type: string
          description: Target download rate
          nullable: true
        download_target_rate_cap:
          type: string
          description: Maximum download rate cap
          nullable: true
        starting_policy:
          type: string
          enum: ["", "fixed", "high", "fair", "low"]
          description: Starting bandwidth policy (empty string indicates inherit)
          nullable: true
        allowed_policy:
          type: string
          enum:
            [
              "",
              "fixed, high, fair, and low",
              "high, fair, and low",
              "fair and low",
              "low",
            ]
          description: Allowed bandwidth policies (empty string indicates inherit)
          nullable: true
        encryption:
          type: string
          enum: ["", "Optional", "AES-128"]
          description: Encryption setting (empty string indicates inherit)
          nullable: true
        encryption_at_rest:
          type: string
          enum: ["", "Optional", "Required"]
          description: Encryption at rest setting (empty string indicates inherit)
          nullable: true

    TransferSettingsUpdate:
      type: object
      properties:
        min_connect_version:
          type: string
          description: Minimum Aspera Connect version (format X.Y or X.Y.Z or X.Y.Z.W)
          example: "3.7.1"
        upload_target_rate:
          type: string
          description: Target upload rate (e.g., "1.5 Gbps", "500Mbps", "10 K", "3000")
          example: "10.0 Kbps"
        upload_target_rate_cap:
          type: string
          description: Maximum upload rate cap
          example: "22.0 Mbps"
        download_target_rate:
          type: string
          description: Target download rate
        download_target_rate_cap:
          type: string
          description: Maximum download rate cap
        starting_policy:
          type: string
          enum: ["", "fixed", "high", "fair", "low"]
          description: Starting bandwidth policy (blank = inherit)
        allowed_policy:
          type: string
          enum:
            [
              "",
              "fixed, high, fair, and low",
              "high, fair, and low",
              "fair and low",
              "low",
            ]
          description: Allowed bandwidth policies (blank = inherit)
        encryption:
          type: string
          enum: ["", "Optional", "AES-128"]
          description: Encryption setting (blank = inherit)
        encryption_at_rest:
          type: string
          enum: ["", "Optional", "Required"]
          description: Encryption at rest (blank = inherit)
        reset_all_defaults:
          type: boolean
          description: Reset all settings to system defaults

    TransferSettingsResponse:
      allOf:
        - $ref: "#/components/schemas/TransferSettings"
        - type: object
          properties:
            errors:
              type: object
              description: Validation errors for each field
              properties:
                upload_target_rate_cap:
                  type: array
                  items:
                    type: string
                upload_target_rate:
                  type: array
                  items:
                    type: string
                download_target_rate_cap:
                  type: array
                  items:
                    type: string
                download_target_rate:
                  type: array
                  items:
                    type: string
                allowed_policy:
                  type: array
                  items:
                    type: string
                starting_policy:
                  type: array
                  items:
                    type: string
            validation_context:
              type: string
              nullable: true

    UserTransferSettings:
      allOf:
        - $ref: "#/components/schemas/TransferSettings"
        - type: object
          required:
            - id
            - authorizable_type
            - authorizable_id
          properties:
            id:
              type: integer
              example: 3
            authorizable_type:
              type: string
              enum: [Authorizable::User]
              example: Authorizable::User
            authorizable_id:
              type: integer
              description: User ID
              example: 5
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    GroupTransferSettings:
      allOf:
        - $ref: "#/components/schemas/TransferSettings"
        - type: object
          required:
            - id
            - authorizable_type
            - authorizable_id
          properties:
            id:
              type: integer
              example: 13
            authorizable_type:
              type: string
              enum: [Authorizable::Group]
              example: Authorizable::Group
            authorizable_id:
              type: integer
              description: Group ID
              example: 1
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    # Pagination Schema
    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        per_page:
          type: integer
          description: Items per page
          example: 25
        total:
          type: integer
          description: Total number of items
          example: 100
        total_pages:
          type: integer
          description: Total number of pages
          example: 4

    # Error Schema
    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type
          example: BadRequest
        message:
          type: string
          description: Human-readable error message
          example: Invalid request parameters
        details:
          type: object
          description: Additional error details
          additionalProperties: true

  responses:
    BadRequest:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: BadRequest
            message: Invalid request parameters

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Unauthorized
            message: Authentication credentials were not provided or are invalid

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Forbidden
            message: You do not have permission to perform this action

    NotFound:
      description: Not found - resource does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: NotFound
            message: The requested resource was not found
